services:
  - type: web
    name: middo_next
    env: production
    buildCommand: |
      apt-get update
      apt-get install -y php php-cli php-common php-curl php-xml php-mbstring php-zip php-pgsql unzip curl
      curl -sS https://getcomposer.org/installer | php
      php composer.phar install --no-dev --optimize-autoloader
    startCommand: php -S 0.0.0.0:10000 -t public
    envVars:
      - key: APP_ENV
        value: prod
      - key: APP_SECRET
        value: 987654321
      - key: DEFAULT_URI
        value: https://middo_next.onrender.com
